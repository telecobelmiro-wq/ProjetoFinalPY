<!DOCTYPE html>
{% load static %}
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartySpace - Descricao</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-5">

    <main class="bg-white border border-black rounded-xl max-w-3xl mx-auto p-8 min-h-[700px]">

        <a href="{% url 'tela_inicial' %}" class="border border-black rounded-md px-5 py-2 text-sm hover:bg-gray-100">
            Voltar
        </a>

        <div class="max-w-md mx-auto mt-10 flex flex-col items-center">
            <h1 class="text-4xl font-bold mb-8">
                PartySpace
            </h1>

            <div class="w-full mb-8">

                <div class="border border-black rounded-xl overflow-hidden">
                    <button type="button" id="abrir-imagem" class="block w-full">
                        <img id="imagem-principal" src="{% static espaco.imagem1 %}" alt="{{ espaco.nome }}"
                            class="w-full h-64 object-cover">
                    </button>
                </div>

                <div class="flex justify-between mt-4">
                    <button type="button" id="voltar-imagem"
                        class="border border-black rounded-md px-5 py-2 text-sm hover:bg-gray-100">
                        Anterior
                    </button>

                    <button type="button" id="proxima-imagem"
                        class="border border-black rounded-md px-5 py-2 text-sm hover:bg-gray-100">
                        Proximo
                    </button>
                </div>

            </div>

            <div class="border border-black rounded-xl w-full p-5 mb-10">

                <p class="font-medium">
                    Descrição
                </p>

                <p class="mt-2 font-bold">
                    {{ espaco.nome }}
                </p>

                <p class="mt-2">
                    {{ espaco.descricao }}
                </p>

            </div>

            <div class="border border-black rounded-xl w-full p-5 mb-10">

                <p class="font-medium">
                    Localização
                </p>

                <p class="mt-2">
                    {{ espaco.endereco }}
                </p>

            </div>

            <a href="{% url 'disponibilidade' %}" class="border border-black rounded-lg px-8 py-3 hover:bg-gray-100">
                Verificar Disponibilidade
            </a>
        </div>
    </main>
</body>

</html>
