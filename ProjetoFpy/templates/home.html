<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartySpace - Inicial</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-zinc-100 px-4 py-8 font-sans text-zinc-950">

    <main class="mx-auto flex min-h-[560px] w-full max-w-3xl flex-col rounded-[28px] border-2 border-black bg-white px-8 py-6 shadow-sm sm:px-12">
        <div class="mb-8 flex items-start justify-between gap-4">
            <div class="w-24"></div>

            <h1 class="mt-5 text-center text-4xl font-bold tracking-wide sm:text-5xl">PartySpace</h1>

            <a href="{% url 'login' %}"
                class="rounded-lg border-2 border-black px-4 py-1 text-xs font-medium transition hover:bg-zinc-100 sm:text-sm">
                Nome do usuario
            </a>
        </div>

        <section class="mb-10">
            <label for="endereco" class="mb-2 block text-base font-medium">Filtrar</label>
            <input id="endereco" name="endereco" type="text" placeholder="endereco"
                class="h-9 w-full rounded-md border-2 border-black px-4 text-sm outline-none transition placeholder:text-zinc-500 focus:ring-2 focus:ring-zinc-300">
        </section>

        <section class="flex flex-1 flex-col gap-4" aria-label="Casas de festa">
            <a href="{% url 'descricao' %}"
                class="flex min-h-20 items-center rounded-2xl border-2 border-black px-7 text-lg font-medium transition hover:bg-zinc-100">
                Exemplo casa 1
            </a>

            <a href="{% url 'descricao' %}"
                class="flex min-h-20 items-center rounded-2xl border-2 border-black px-7 text-lg font-medium transition hover:bg-zinc-100">
                Exemplo casa 2
            </a>

            <a href="{% url 'descricao' %}"
                class="flex min-h-20 items-center rounded-2xl border-2 border-black px-7 text-lg font-medium transition hover:bg-zinc-100">
                Exemplo casa 3
            </a>
        </section>

        <div class="mt-9 flex justify-center gap-2" aria-label="Mais opcoes">
            <span class="h-3 w-3 rounded-full bg-zinc-950"></span>
            <span class="h-3 w-3 rounded-full bg-zinc-950"></span>
            <span class="h-3 w-3 rounded-full bg-zinc-950"></span>
        </div>
    </main>

</body>

</html>
