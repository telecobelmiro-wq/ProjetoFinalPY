<!DOCTYPE html>
{% load static %}
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartySpace Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-5">

    <main class="bg-white border border-black rounded-xl max-w-3xl mx-auto p-8">

        <header class="flex justify-between items-center mb-8">
            <div></div>
            <h1 class="text-4xl font-bold">PartySpace</h1>
            <a href="{% url 'login' %}" class="border border-black rounded-md px-4 py-2 text-sm hover:bg-gray-100">
                {{ usuario_nome|default:"Nome do usuario" }}
            </a>
        </header>

        <div class="mb-8">
            <label class="block mb-2">Filtrar</label>
            <input id="filtro" type="text" placeholder="Endereco"
                class="w-full h-10 border border-black rounded-md px-4">
        </div>

        <div class="space-y-4">
            {% for espaco in espacos %}
            <a href="{% url 'descricao' %}?espaco={{ espaco.id }}"
                class="espaco-card border border-black rounded-xl p-3 flex items-center gap-4 hover:bg-gray-100"
                data-end="{{ espaco.endereco|lower }}">
                <img src="{% static espaco.imagem1 %}" alt="{{ espaco.nome }}"
                    class="w-28 h-16 object-cover rounded-lg">
                <div>
                    <p class="font-bold">{{ espaco.nome }}</p>
                    <p class="text-sm">{{ espaco.endereco }}</p>
                    {% if espaco.id in alugados %}
                    <span class="inline-block mt-1 text-xs px-3 py-1 rounded-md bg-orange-100 text-orange-800">🔒
                        Alugado por você</span>
                    {% else %}
                    <span class="inline-block mt-1 text-xs px-3 py-1 rounded-md bg-green-100 text-green-800">✅
                        Disponível</span>
                    {% endif %}
                </div>
            </a>
            {% endfor %}
        </div>

    </main>

    <script>
        document.getElementById('filtro').addEventListener('input', function () {
            var val = this.value.toLowerCase()
            document.querySelectorAll('.espaco-card').forEach(function (card) {
                card.style.display = card.getAttribute('data-end').includes(val) ? '' : 'none'
            })
        })
    </script>

</body>

</html>
