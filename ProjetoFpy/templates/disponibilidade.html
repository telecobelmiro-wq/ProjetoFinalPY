{% extends "base.html" %}
{% block content %}
{% load static %}

<div class="bg-white border border-black rounded-xl max-w-3xl mx-auto p-8 min-h-[760px]">
    <a href="{% url 'descricao' %}"
        class="border border-black rounded-md px-5 py-2 text-sm hover:bg-gray-200">Voltar</a>

    <div class="max-w-md mx-auto mt-12">
        <div id="carouselExample" class="carousel slide">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="{% static espaco.imagem1 %}" alt="{{ espaco.nome }}" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="{% static espaco.imagem2 %}" alt="{{ espaco.nome }}" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="{% static espaco.imagem3 %}" alt="{{ espaco.nome }}" class="d-block w-100">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>

        <p class="text-sm mb-3">Escolha o dia e a duração do evento</p>

        <div class="border border-black rounded-xl p-6">
            <form method="POST" id="form-alugar">
                {% csrf_token %}
                <input type="hidden" name="espaco_id" value="{{ espaco.id }}">

                <div class="flex gap-4 items-center mb-6 text-sm">
                    <label>Dia</label>
                    <input type="text" name="dia" class="border border-black rounded px-2 w-24 h-7">
                    <label>Duração</label>
                    <input type="text" name="duracao" class="border border-black rounded px-2 w-24 h-7">
                </div>

                <div class="grid grid-cols-2 gap-y-2 text-lg">
                    <button type="button" class="horario text-left text-green-600" data-hora="1:00">1:00</button>
                    <button type="button" class="horario text-left" data-hora="13:00">13:00</button>
                    <button type="button" class="horario text-left text-green-600" data-hora="2:00">2:00</button>
                    <button type="button" class="horario text-left" data-hora="14:00">14:00</button>
                    <button type="button" class="horario text-left text-green-600" data-hora="3:00">3:00</button>
                    <button type="button" class="horario text-left" data-hora="15:00">15:00</button>
                    <button type="button" class="horario text-left text-green-600" data-hora="4:00">4:00</button>
                    <button type="button" class="horario text-left" data-hora="16:00">16:00</button>
                    <button type="button" class="horario text-left text-green-600" data-hora="5:00">5:00</button>
                    <button type="button" class="horario text-left" data-hora="17:00">17:00</button>
                    <button type="button" class="horario text-left text-green-600" data-hora="6:00">6:00</button>
                    <button type="button" class="horario text-left" data-hora="18:00">18:00</button>
                    <button type="button" class="horario text-left text-green-600" data-hora="7:00">7:00</button>
                    <button type="button" class="horario text-left" data-hora="19:00">19:00</button>
                    <button type="button" class="horario text-left text-red-600" data-hora="8:00">8:00</button>
                    <button type="button" class="horario text-left" data-hora="20:00">20:00</button>
                    <button type="button" class="horario text-left text-red-600" data-hora="9:00">9:00</button>
                    <button type="button" class="horario text-left" data-hora="21:00">21:00</button>
                    <button type="button" class="horario text-left text-red-600" data-hora="10:00">10:00</button>
                    <button type="button" class="horario text-left" data-hora="22:00">22:00</button>
                    <button type="button" class="horario text-left text-red-600" data-hora="11:00">11:00</button>
                    <button type="button" class="horario text-left" data-hora="23:00">23:00</button>
                    <button type="button" class="horario text-left text-red-600" data-hora="12:00">12:00</button>
                    <button type="button" class="horario text-left" data-hora="00:00">00:00</button>
                </div>

                <input type="hidden" id="horarios" name="horarios">
            </form>
        </div>

        <button id="alugar" type="submit" form="form-alugar"
            class="border border-black rounded-lg px-20 py-3 mt-10 text-sm hover:bg-gray-200 block mx-auto">
            ALUGAR
        </button>
    </div>
</div>

<script>
    let horariosEscolhidos = []

    document.querySelectorAll(".horario").forEach(function (btn) {
        btn.addEventListener("click", function () {
            let hora = this.dataset.hora

            if (horariosEscolhidos.includes(hora)) {
                horariosEscolhidos = horariosEscolhidos.filter(h => h != hora)
                this.classList.remove("bg-gray-200")
            } else {
                horariosEscolhidos.push(hora)
                this.classList.add("bg-gray-200")
            }

            document.getElementById("horarios").value = horariosEscolhidos.join(",")
        })
    })
</script>
{% endblock %}
