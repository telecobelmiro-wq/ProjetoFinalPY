<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartySpace - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">


    <div class="bg-white border border-black rounded-xl w-full max-w-md p-8">


        <a href="{% url 'tela_inicial' %}" class="border border-black rounded-md px-4 py-2 text-sm hover:bg-gray-100">
            Voltar
        </a>


        <h1 class="text-center text-4xl font-bold mt-8 mb-8">
            PartySpace
        </h1>



        {% if messages %}

        <div class="mb-5">

            {% for message in messages %}

            <div class="bg-red-100 border border-red-500 text-red-700 px-4 py-2 rounded-lg text-sm">
                {{ message }}
            </div>

            {% endfor %}

        </div>

        {% endif %}




        <form method="POST">

            {% csrf_token %}



            <div class="mb-4">

                <label class="block mb-2 font-medium">
                    Nome:
                </label>

                <input type="text" name="nome" required class="w-full h-12 border border-black rounded-lg px-4">

            </div>




            <div class="mb-4">

                <label class="block mb-2 font-medium">
                    CPF:
                </label>

                <input type="text" name="cpf" required class="w-full h-12 border border-black rounded-lg px-4">

            </div>




            <div class="mb-4">

                <label class="block mb-2 font-medium">
                    Senha:
                </label>

                <input type="password" name="senha" required class="w-full h-12 border border-black rounded-lg px-4">

            </div>




            <div class="mb-6">

                <label class="block mb-2 font-medium">
                    Confirmar senha:
                </label>

                <input type="password" name="confirmar_senha" required
                    class="w-full h-12 border border-black rounded-lg px-4">

            </div>


            <button type="submit" class="w-full border border-black rounded-lg py-3 hover:bg-gray-100">
                Cadastre-se
            </button>

        </form>
    </div>

</body>

</html>
