<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartySpace - Cadastro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

    <div
        class="relative border-2 border-black rounded-3xl p-12 bg-white w-full max-w-md text-center shadow-sm mx-4 my-8">

        <div class="absolute top-6 left-6">
            <a href="{% url 'tela_inicial' %}"
                class="inline-block py-1 px-4 border-2 border-black rounded-xl text-sm font-medium text-gray-900 hover:bg-gray-100 transition duration-200">
                Voltar
            </a>
        </div>

        <h1 class="text-4xl font-bold mb-12 tracking-wide text-gray-800 mt-6">PartySpace</h1>

        {% if messages %}
        <div class="mb-6 text-left">
            {% for message in messages %}
            <div class="bg-red-100 border-2 border-red-500 text-red-700 px-4 py-2 rounded-2xl font-bold text-sm">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" class="text-left space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-1 pl-2">Nome:</label>
                <input type="text" name="nome" required
                    class="w-full px-4 py-3 border-2 border-black rounded-2xl text-lg focus:outline-none">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-1 pl-2">CPF:</label>
                <input type="text" name="cpf" required
                    class="w-full px-4 py-3 border-2 border-black rounded-2xl text-lg focus:outline-none">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-1 pl-2">Senha:</label>
                <input type="password" name="senha" required
                    class="w-full px-4 py-3 border-2 border-black rounded-2xl text-lg focus:outline-none">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-1 pl-2">Confirmar senha:</label>
                <input type="password" name="confirmar_senha" required
                    class="w-full px-4 py-3 border-2 border-black rounded-2xl text-lg focus:outline-none">
            </div>

            <div class="flex justify-center pt-4">
                <button type="submit"
                    class="w-full py-3 px-6 border-2 border-black rounded-2xl text-xl font-medium text-gray-900 hover:bg-gray-100 transition duration-200 cursor-pointer">
                    Cadastre-se
                </button>
            </div>
        </form>

    </div>

</body>

</html>
