<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartySpace - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex min-h-screen items-center justify-center bg-slate-950 p-5 text-slate-100">

    <main class="w-full max-w-md rounded-lg border border-sky-200/30 bg-slate-900 p-8 shadow-xl shadow-slate-950/40">

        <p class="text-center text-xs font-bold uppercase tracking-wide text-sky-300">Dubai Eventos</p>
        <h1 class="mt-2 text-center text-4xl font-bold text-white">
            PartySpace
        </h1>
        <p class="mt-2 text-center text-sm text-slate-300">Entre para acessar os espacos</p>

        {% if messages %}
        <div class="mt-6 space-y-2">
            {% for message in messages %}
            <div class="rounded-lg border px-4 py-3 text-sm {% if message.tags == 'success' %}border-sky-300/40 bg-sky-400/10 text-sky-100{% else %}border-red-300/40 bg-red-950/70 text-red-100{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="mt-8 space-y-5">
            {% csrf_token %}

            <div>
                <label for="email" class="mb-2 block text-sm font-semibold text-sky-100">Email</label>
                <input id="email" type="text" name="email" value="{{ email|default:'' }}" inputmode="email" required
                    class="h-12 w-full rounded-lg border border-slate-700 bg-slate-950 px-4 text-slate-100 outline-none placeholder:text-slate-500 focus:border-sky-300">
            </div>

            <div>
                <label for="password" class="mb-2 block text-sm font-semibold text-sky-100">Senha</label>
                <input id="password" type="password" name="password" required
                    class="h-12 w-full rounded-lg border border-slate-700 bg-slate-950 px-4 text-slate-100 outline-none focus:border-sky-300">
            </div>

            <button type="submit" class="w-full rounded-lg bg-sky-400 px-8 py-3 text-sm font-bold uppercase text-slate-950 shadow-lg shadow-sky-500/20 hover:bg-sky-300">
                Entrar
            </button>
        </form>

        <p class="mt-5 text-center text-sm text-slate-300">
            <a href="{% url 'cadastro' %}" class="font-semibold text-sky-300 hover:text-sky-200">
                Cadastre-se
            </a>
        </p>
    </main>
</body>

</html>
