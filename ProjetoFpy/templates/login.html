<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartySpace - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex min-h-screen items-center justify-center bg-slate-100 p-5 text-slate-900">

    <main class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-8 shadow-sm">

        <h1 class="text-center text-4xl font-bold">
            PartySpace
        </h1>
        <p class="mt-2 text-center text-sm text-slate-500">Entre para acessar os espacos</p>

        {% if messages %}
        <div class="mt-6 space-y-2">
            {% for message in messages %}
            <div class="rounded-lg border px-4 py-3 text-sm {% if message.tags == 'success' %}border-green-200 bg-green-50 text-green-800{% else %}border-red-200 bg-red-50 text-red-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="mt-8 space-y-5">
            {% csrf_token %}

            <div>
                <label for="email" class="mb-2 block text-sm font-medium">Email</label>
                <input id="email" type="text" name="email" value="{{ email|default:'' }}" inputmode="email" required
                    class="h-12 w-full rounded-lg border border-slate-300 px-4 outline-none focus:border-slate-700">
            </div>

            <div>
                <label for="password" class="mb-2 block text-sm font-medium">Senha</label>
                <input id="password" type="password" name="password" required
                    class="h-12 w-full rounded-lg border border-slate-300 px-4 outline-none focus:border-slate-700">
            </div>

            <button type="submit" class="w-full rounded-lg bg-slate-900 px-8 py-3 text-sm font-semibold uppercase text-white hover:bg-slate-700">
                Entrar
            </button>
        </form>

        <p class="mt-5 text-center text-sm text-slate-600">
            <a href="{% url 'cadastro' %}" class="font-medium text-slate-900 hover:underline">
                Cadastre-se
            </a>
        </p>
    </main>
</body>

</html>
