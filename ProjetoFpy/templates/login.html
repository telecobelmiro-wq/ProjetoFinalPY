<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartySpace - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-zinc-100 px-4 py-8 font-sans text-zinc-950">

    <main class="relative mx-auto flex min-h-[560px] w-full max-w-3xl flex-col rounded-[28px] border-2 border-black bg-white px-8 py-6 shadow-sm sm:px-12">
        <a href="{% url 'tela_inicial' %}"
            class="absolute left-6 top-6 rounded-lg border-2 border-black px-6 py-1 text-base font-medium transition hover:bg-zinc-100">
            Voltar
        </a>

        <section class="mx-auto flex w-full max-w-md flex-1 flex-col justify-center pt-10">
            <h1 class="mb-9 text-center text-4xl font-bold tracking-wide sm:text-5xl">PartySpace</h1>

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label for="username" class="mb-2 block pl-6 text-base font-medium">Nome:</label>
                    <input id="username" type="text" name="username" required
                        class="h-16 w-full rounded-2xl border-2 border-black px-5 text-lg outline-none transition focus:ring-2 focus:ring-zinc-300">
                </div>

                <div>
                    <label for="password" class="mb-2 block pl-6 text-base font-medium">Senha:</label>
                    <input id="password" type="password" name="password" required
                        class="h-16 w-full rounded-2xl border-2 border-black px-5 text-lg outline-none transition focus:ring-2 focus:ring-zinc-300">
                </div>

                <div class="flex flex-col items-center gap-3 pt-8">
                    <button type="submit"
                        class="w-44 rounded-lg border-2 border-black px-6 py-2 text-sm font-medium transition hover:bg-zinc-100">
                        Entrar
                    </button>

                    <a href="{% url 'cadastro' %}" class="text-base font-medium transition hover:underline">
                        Cadastre-se
                    </a>
                </div>
            </form>
        </section>
    </main>

</body>

</html>
